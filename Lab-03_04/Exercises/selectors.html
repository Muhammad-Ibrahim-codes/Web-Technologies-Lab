<!doctype html>
<html>
  <head>
    <title>CSS Selectors Practice</title>
    <link rel="stylesheet" href="/Lab-03/Styles/selectors.css" />
  </head>

  <body>
    <h1 id="title">CSS Selectors Example</h1>

    <div class="box">
      <p>This is paragraph inside a div.</p>
    </div>

    <h2>Section Heading</h2>
    <p>This paragraph is next to h2.</p>

    <h3>Another Heading</h3>
    <p>Paragraph 1</p>
    <p>Paragraph 2</p>

    <ul>
      <li>First item</li>
      <li>Second item</li>
      <li>Third item</li>
    </ul>

    <h2>Links</h2>
    <a href="https://google.com">Google</a><br />
    <a href="http://example.com">Normal Link</a>

    <h2>Form</h2>
    <input type="text" placeholder="Enter name" />
    <input type="password" placeholder="Password" />
    <button>Submit</button>
  </body>
</html>
