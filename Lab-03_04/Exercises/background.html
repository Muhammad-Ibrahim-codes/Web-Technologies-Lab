<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Background Gallery</title>

    <link rel="stylesheet" href="/Lab-03/Styles/background.css" />
  </head>
  <body>
    <h2>Background Gallery</h2>

    <!-- Solid Colors -->
    <div class="section solid-red">
      <p>Solid Red Background</p>
    </div>

    <div class="section solid-blue">
      <p>Solid Blue Background</p>
    </div>

    <!-- Image Backgrounds -->
    <div class="section bg-image-repeat">
      <p>Image Background Repeat</p>
    </div>

    <div class="section bg-image-no-repeat">
      <p>Image Background No Repeat</p>
    </div>

    <div class="section bg-image-repeat-x">
      <p>Repeat X</p>
    </div>

    <div class="section bg-image-repeat-y">
      <p>Repeat Y</p>
    </div>

    <!-- Gradients -->
    <div class="section linear-gradient">
      <p>Linear Gradient</p>
    </div>

    <div class="section radial-gradient">
      <p>Radial Gradient</p>
    </div>

    <!-- Multiple Background Layers -->
    <div class="section multiple-layers">
      <p>Multiple Background Layers</p>
    </div>

    <!-- Background Blend Modes -->
    <div class="section blend-mode">
      <p>Background Blend Mode: Multiply</p>
    </div>
  </body>
</html>
