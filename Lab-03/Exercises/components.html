<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Card Component Design</title>
    <link rel="stylesheet" href="/Lab-03/Styles/components.css" />
  </head>

  <body>
    <h1>Product Cards</h1>

    <div class="card-container">
      <div class="card">
        <img
          src="/Lab-03/Images/Background/pexels-bess-hamiti-83687-36764.jpg"
          alt="product"
        />
        <div class="card-content">
          <h3>Product One</h3>
          <p>This is a sample product card with description text.</p>
          <button>Buy Now</button>
        </div>
      </div>

      <div class="card">
        <img
          src="/Lab-03/Images/Background/pexels-felix-mittermeier-956981.jpg"
          alt="product"
        />
        <div class="card-content">
          <h3>Product Two</h3>
          <p>This card shows how consistent spacing and shadows work.</p>
          <button>Learn More</button>
        </div>
      </div>

      <div class="card">
        <img
          src="/Lab-03/Images/Background/pexels-bess-hamiti-83687-36764.jpg"
          alt="product"
        />
        <div class="card-content">
          <h3>Product Three</h3>
          <p>Hover the card to see the transformation effect.</p>
          <button>Details</button>
        </div>
      </div>
    </div>
  </body>
</html>
