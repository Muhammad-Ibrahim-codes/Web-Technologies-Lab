<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transform</title>
    <link rel="stylesheet" href="/Lab-03/Styles/transform.css" />
  </head>
  <body>
    <h1>Transform</h1>

    <section class="gallery">
      <!-- Rotation -->
      <div class="card rotate">
        <p>Rotate 45°</p>
      </div>

      <!-- Scaling -->
      <div class="card scale">
        <p>Scale 1.5x</p>
      </div>

      <!-- Translation -->
      <div class="card translate">
        <p>Move Right & Down</p>
      </div>

      <!-- 3D Transform -->
      <div class="card rotate3d">
        <p>3D Rotate</p>
      </div>

      <!-- Transform Origin -->
      <div class="card origin">
        <p>Origin Top Left</p>
      </div>

      <!-- Combined Transform -->
      <div class="card combined">
        <p>Rotate + Scale + Translate</p>
      </div>
    </section>
  </body>
</html>
