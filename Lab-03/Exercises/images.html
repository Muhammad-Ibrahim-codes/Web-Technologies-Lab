<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Styled Images</title>
    <link rel="stylesheet" href="/Lab-03/Styles/images.css" />
  </head>
  <body>
    <h1>Image Styling Portfolio</h1>
    <br />

    <h2>Rounded corners and Circular image</h2>

    <img
      src="/Lab-03/Images/Background/pexels-bess-hamiti-83687-36764.jpg"
      class="rounded"
      alt="Rounded Image"
    />
    <img
      src="/Lab-03/Images/Background/pexels-felix-mittermeier-956981.jpg"
      class="circular"
      alt="Circular Image"
    />
    <hr />

    <h2>Borders and shadows</h2>
    <h2>Hover Effects & Transitions</h2>
    <h2>CSS Filters Applied</h2>

    <img
      src="/Lab-03/Images/Background/pexels-bess-hamiti-83687-36764.jpg"
      class="border-shadow"
    />
    <img
      src="/Lab-03/Images/Background/pexels-felix-mittermeier-956981.jpg"
      class="border-shadow"
    />
    <hr />

    <h2>Image Overlays with text</h2>

    <div class="image-overlay-container">
      <img
        src="/Lab-03/Images/Background/pexels-bess-hamiti-83687-36764.jpg"
        alt="Overlay Image"
      />
      <div class="overlay">
        <div class="overlay-text">This is overlay text</div>
      </div>
    </div>
  </body>
</html>
