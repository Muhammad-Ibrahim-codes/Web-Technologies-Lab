<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Styling</title>
    <link rel="stylesheet" href="/Lab-03/Styles/buttons.css" />
  </head>

  <body>
    <h1>Button Styling</h1>

    <div class="container">
      <button class="btn small">Small Button</button>

      <button class="btn medium">Medium Button</button>

      <button class="btn large">Large Button</button>

      <button class="btn primary">Primary</button>

      <button class="btn success">Success</button>

      <button class="btn danger">Danger</button>

      <button class="btn round">Rounded</button>

      <button class="btn gradient">Gradient</button>

      <button class="btn shadow">Shadow Button</button>

      <button class="btn" disabled>Disabled</button>
    </div>
  </body>
</html>
