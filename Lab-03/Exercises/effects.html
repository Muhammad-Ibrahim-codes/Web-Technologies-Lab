<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced CSS Effects Showcase</title>
    <link rel="stylesheet" href="/Lab-03/Styles/effects.css" />
  </head>
  <body>
    <h1 class="gradient-text">Gradient Text Effect</h1>

    <section>
      <h2>Custom Checkboxes & Radio Buttons</h2>
      <label class="custom-checkbox">
        <input type="checkbox" />
        <span>Option 1</span>
      </label>
      <label class="custom-checkbox">
        <input type="checkbox" />
        <span>Option 2</span>
      </label>

      <label class="custom-radio">
        <input type="radio" name="radio" checked />
        <span>Choice A</span>
      </label>
      <label class="custom-radio">
        <input type="radio" name="radio" />
        <span>Choice B</span>
      </label>
    </section>

    <section>
      <h2>Loading Animations</h2>
      <div class="loader"></div>
    </section>

    <section>
      <h2>Text Clipping with Background Image</h2>
      <h1 class="clipped-text">CSS ROCKS</h1>
    </section>

    <section>
      <h2>Complex Shadow Effects</h2>
      <div class="shadow-box">Shadow Box</div>
    </section>
  </body>
</html>
