<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Card Layout</title>
    <link rel="stylesheet" href="/Lab 05_06/Styles/flexbox_card.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h2>Card One</h2>
        <p>This is a short description.</p>
        <button>Read More</button>
      </div>

      <div class="card">
        <h2>Card Two</h2>
        <p>
          This card has more content to show how equal height works in flexbox
          layout. Even with more text, all cards stay equal height.
        </p>
        <button>Read More</button>
      </div>

      <div class="card">
        <h2>Card Three</h2>
        <p>Another example card.</p>
        <button>Read More</button>
      </div>

      <div class="card">
        <h2>Card Four</h2>
        <p>Cards automatically adjust based on screen size.</p>
        <button>Read More</button>
      </div>
    </div>
  </body>
</html>
