<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-commerce Grid</title>
    <link rel="stylesheet" href="/Lab 05_06/Styles/e-commerce.css" />
  </head>
  <body>
    <header class="header">
      <h1>Shop</h1>

      <input type="checkbox" id="toggle-sidebar" class="toggle-sidebar" />
      <label for="toggle-sidebar" class="filter-btn">☰ Filters</label>
    </header>

    <div class="container">
      <aside class="sidebar">
        <h3>Filters</h3>
        <label><input type="checkbox" /> Electronics</label>
        <label><input type="checkbox" /> Clothing</label>
        <label><input type="checkbox" /> Shoes</label>
        <label><input type="checkbox" /> Accessories</label>
      </aside>

      <main class="products">
        <div class="card">
          <img src="https://via.placeholder.com/200" alt="" />
          <h4>Product 1</h4>
          <p>$20</p>
          <button>Add to Cart</button>
        </div>

        <div class="card">
          <img src="https://via.placeholder.com/200" alt="" />
          <h4>Product 2</h4>
          <p>$35</p>
          <button>Add to Cart</button>
        </div>

        <div class="card">
          <img src="https://via.placeholder.com/200" alt="" />
          <h4>Product 3</h4>
          <p>$15</p>
          <button>Add to Cart</button>
        </div>

        <div class="card">
          <img src="https://via.placeholder.com/200" alt="" />
          <h4>Product 4</h4>
          <p>$50</p>
          <button>Add to Cart</button>
        </div>
      </main>
    </div>
  </body>
</html>
