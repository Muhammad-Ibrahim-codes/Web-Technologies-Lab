<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        background-color: #f4f6f8;
        color: #333;
      }

      .dashboard {
        display: grid;
        grid-template-columns: 250px 1fr;
        grid-template-rows: 60px 1fr;
        grid-template-areas:
          "sidebar header"
          "sidebar main";
        height: 100vh;
      }

      .sidebar {
        grid-area: sidebar;
        background-color: #1f2937;
        color: #fff;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        transition: all 0.3s ease;
      }

      .sidebar h2 {
        margin-bottom: 2rem;
        font-size: 1.5rem;
      }

      .sidebar nav a {
        color: #fff;
        text-decoration: none;
        margin: 0.5rem 0;
        padding: 0.5rem;
        border-radius: 5px;
        transition: background 0.2s;
      }

      .sidebar nav a:hover {
        background-color: #374151;
      }

      .header {
        grid-area: header;
        background-color: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        border-bottom: 1px solid #ddd;
      }

      .header h1 {
        font-size: 1.2rem;
      }

      .main {
        grid-area: main;
        padding: 1rem;
        overflow-y: auto;
      }

      .stats {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 2rem;
      }

      .card {
        flex: 1 1 200px;
        background-color: #fff;
        padding: 1rem;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .card h3 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }

      .card p {
        font-size: 0.9rem;
        color: #555;
      }

      @media (max-width: 1024px) {
        .dashboard {
          grid-template-columns: 60px 1fr;
        }

        .sidebar {
          padding: 1rem 0.5rem;
        }

        .sidebar h2 {
          display: none;
        }

        .sidebar nav a {
          text-align: center;
          margin: 0.3rem 0;
          padding: 0.5rem 0;
        }
      }

      @media (max-width: 768px) {
        .dashboard {
          grid-template-columns: 1fr;
          grid-template-rows: 60px auto 1fr;
          grid-template-areas:
            "header"
            "sidebar"
            "main";
        }

        .sidebar {
          flex-direction: row;
          overflow-x: auto;
          white-space: nowrap;
        }

        .sidebar nav a {
          display: inline-block;
          margin: 0 0.5rem;
        }

        .stats {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <h2>Admin</h2>
        <nav>
          <a href="#">Dashboard</a>
          <a href="#">Users</a>
          <a href="#">Orders</a>
          <a href="#">Products</a>
          <a href="#">Settings</a>
        </nav>
      </aside>

      <header class="header">
        <h1>Dashboard</h1>
        <div>User</div>
      </header>

      <main class="main">
        <div class="stats">
          <div class="card">
            <h3>1,245</h3>
            <p>New Users</p>
          </div>
          <div class="card">
            <h3>532</h3>
            <p>Orders</p>
          </div>
          <div class="card">
            <h3>85%</h3>
            <p>Server Uptime</p>
          </div>
          <div class="card">
            <h3>$12,340</h3>
            <p>Revenue</p>
          </div>
        </div>

        <div class="content">
          <h2>Recent Activity</h2>
          <p>
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed et diam
            ut ligula fermentum ultrices.
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
