<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holy Grail Layout</title>
    <link rel="stylesheet" href="/Lab 05_06/Styles/grial.css" />
  </head>
  <body>
    <h1 class="title">Holy Grail Layout</h1>

    <section>
      <h2>1. Float Layout</h2>
      <header class="header">Header</header>

      <div class="float-container">
        <aside class="left">Left Sidebar</aside>
        <main class="main">Main Content</main>
        <aside class="right">Right Sidebar</aside>
      </div>

      <footer class="footer">Footer</footer>
    </section>

    <section>
      <h2>2. Flexbox Layout</h2>
      <header class="header">Header</header>

      <div class="flex-container">
        <aside class="left">Left Sidebar</aside>
        <main class="main">Main Content</main>
        <aside class="right">Right Sidebar</aside>
      </div>

      <footer class="footer">Footer</footer>
    </section>

    <section>
      <h2>3. CSS Grid Layout</h2>

      <div class="grid-container">
        <header class="header">Header</header>
        <aside class="left">Left Sidebar</aside>
        <main class="main">Main Content</main>
        <aside class="right">Right Sidebar</aside>
        <footer class="footer">Footer</footer>
      </div>
    </section>
  </body>
</html>
